name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package Matrix
        run: |
          zip -r matrix-release.zip Matrix.ps1 lib/ tools/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the release and tag exist (no-op if already present)
          gh release create latest \
            --title "Latest" \
            --notes "Latest Matrix release. Install with the one-liner in the README." \
            --latest 2>/dev/null || true

          # Replace assets in-place — no delete/recreate window where installs 404
          gh release upload latest matrix-release.zip install/install.pwsh.ps1 --clobber

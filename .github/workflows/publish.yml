name: Test and Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run tests (schema + unit, no network)
        shell: pwsh
        run: pwsh tests/Run-Tests.ps1 -SchemaOnly

  release:
    name: Publish Release
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package Matrix
        run: |
          zip -r matrix-release.zip Matrix.ps1 lib/ tools/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true

          gh release create latest matrix-release.zip \
            --title "Latest" \
            --notes "Latest Matrix release. Install with the one-liner in the README." \
            --latest

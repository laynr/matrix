name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package Matrix
        run: |
          zip -r matrix-release.zip Matrix.ps1 lib/ tools/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest 2>/dev/null || true

          gh release create latest matrix-release.zip \
            --title "Latest" \
            --notes "Latest Matrix release. Install with the one-liner in the README." \
            --latest
